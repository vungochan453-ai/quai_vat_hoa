<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa Học 7 - Siêu Cấp</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0c29; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; padding: 20px; box-sizing: border-box; }
        .card { background: #302b63; padding: 20px; border-radius: 20px; box-shadow: 0 0 20px #00d2ff; width: 100%; max-width: 380px; text-align: center; }
        h2 { color: #00d2ff; font-size: 20px; text-transform: uppercase; margin-bottom: 20px; }
        .box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #24243e; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; text-align: center; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00d2ff; color: #0f0c29; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .result { margin-top: 15px; text-align: left; padding: 10px; background: #24243e; border-radius: 10px; display: none; border-left: 4px solid #00d2ff; }
        .ptk-res { color: #f1c40f; font-weight: bold; font-size: 18px; margin-top: 10px; display: block; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h2>HÓA HỌC 7 - SIÊU CẤP</h2>
    <div class="box">
        <p>1. Tra cứu nguyên tố</p>
        <input type="text" id="search" placeholder="Nhập Kí hiệu (Fe, Mg, O...)">
        <button onclick="traCuu()">TRIỆU HỒI</button>
        <div id="info" class="result">
            Tên: <b id="ten" style="color:#00d2ff"></b><br>
            Hóa trị: <b id="ht" style="color:#f1c40f"></b><br>
            NTK: <b id="ntk" style="color:#2ecc71"></b>
        </div>
    </div>
    <div class="box">
        <p>2. Tính Phân tử khối (PTK)</p>
        <input type="text" id="formula" placeholder="Ví dụ: H2O, NaCl, CaCO3">
        <button onclick="tinhPTK()" style="background: #2ecc71;">TÍNH NGAY</button>
        <div id="ptk-info" class="result">
            Kết quả: <span id="ptk-val" class="ptk-res"></span>
        </div>
    </div>
</div>
<script>
    const data = {
        "H": 1, "He": 4, "Li": 7, "Be": 9, "B": 11, "C": 12, "N": 14, "O": 16, "F": 19, "Ne": 20,
        "Na": 23, "Mg": 24, "Al": 27, "Si": 28, "P": 31, "S": 32, "Cl": 35.5, "Ar": 40, "K": 39, "Ca": 40,
        "Fe": 56, "Cu": 64, "Zn": 65, "Ag": 108, "Ba": 137, "Au": 197
    };
    const hoatri = { "H":"I", "O":"II", "Mg":"II", "Al":"III", "Fe":"II, III", "Cu":"I, II", "Na":"I", "Ca":"II", "Cl":"I", "S":"II, IV, VI" };
    function traCuu() {
        const q = document.getElementById('search').value.trim();
        const res = data[q] || data[q.charAt(0).toUpperCase() + q.slice(1).toLowerCase()];
        if(res) {
            document.getElementById('info').style.display = 'block';
            document.getElementById('ten').innerText = q.toUpperCase();
            document.getElementById('ntk').innerText = res + " amu";
            document.getElementById('ht').innerText = hoatri[q] || "Chưa rõ";
        } else { alert("Không thấy nguyên tố này!"); }
    }
    function tinhPTK() {
        const f = document.getElementById('formula').value.trim();
        const regex = /([A-Z][a-z]?)(\d*)/g;
        let match; let total = 0;
        while ((match = regex.exec(f)) !== null) {
            let symbol = match[1];
            let count = parseInt(match[2]) || 1;
            if (data[symbol]) { total += data[symbol] * count; } 
            else { alert("Không biết chất: " + symbol); return; }
        }
        if(total > 0) {
            document.getElementById('ptk-info').style.display = 'block';
            document.getElementById('ptk-val').innerText = total + " amu";
        }
    }
</script>
</body>
</html>
